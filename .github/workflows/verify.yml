name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        timeout-minutes: 5
        run: npx playwright install chromium

      - name: Run syntax checks
        run: npm run check

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Validate app version
        run: npm run validate:version

      - name: Validate asset manifest
        run: npm run validate:manifest

      - name: Validate asset sizes
        run: npm run validate:asset-sizes

      - name: Validate asset sources
        run: npm run validate:asset-sources

      - name: Validate static accessibility
        run: npm run validate:static-a11y

      - name: Validate dev-mode boundaries
        run: npm run validate:dev-mode

      - name: Validate GitHub templates
        run: npm run validate:github-templates

      - name: Validate workflow contract
        run: npm run validate:workflow

      - name: Validate documentation
        run: npm run validate:docs

      - name: Validate source structure
        run: npm run validate:structure

      - name: Validate global bridge
        run: npm run validate:global-bridge

      - name: Validate CSS guardrails
        run: npm run validate:css

      - name: Validate HTML safety
        run: npm run validate:html-safety

      - name: Validate storage keys
        run: npm run validate:storage-keys

      - name: Validate delegated UI handlers
        run: npm run validate:inline-handlers

      - name: Validate intentional error handling
        run: npm run validate:error-handling

      - name: Validate runtime module bridge
        run: npm run validate:runtime-modules

      - name: Validate dependency pins
        run: npm run validate:dependencies

      - name: Validate clean ignore contract
        run: npm run validate:clean-ignore

      - name: Validate project schema
        run: npm run validate:project-schema

      - name: Validate app state dispatcher
        run: npm run validate:app-state

      - name: Validate planner geometry
        run: npm run validate:geometry

      - name: Validate 3D lifecycle
        run: npm run validate:3d-lifecycle

      - name: Validate export filenames
        run: npm run validate:export-filenames

      - name: Run built-in self-test
        run: npm run test:self

      - name: Run Playwright spec suite
        run: npm run test:playwright

      - name: Run Playwright smoke
        run: npm run test:smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-game-smoke
          path: output/web-game-smoke
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: output/playwright
          if-no-files-found: ignore
