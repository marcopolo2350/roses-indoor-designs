name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run syntax checks
        run: npm run check

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Validate asset manifest
        run: npm run validate:manifest

      - name: Validate delegated UI handlers
        run: npm run validate:inline-handlers

      - name: Validate intentional error handling
        run: npm run validate:error-handling

      - name: Run built-in self-test
        run: npm run test:self

      - name: Run Playwright spec suite
        run: npm run test:playwright

      - name: Run Playwright smoke
        run: npm run test:smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-game-smoke
          path: output/web-game-smoke
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: output/playwright
          if-no-files-found: ignore
